<!-- base.html -->
<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Power Envision{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block head %}{% endblock %}
  </head>
  <body class="bg-dark text-white">
        <!-- Top Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">LINE2CHARGE</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebar" aria-controls="sidebar">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
              <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                  <a class="nav-link active" aria-current="page" href="{{ url_for('line_bp.customer_home') }}">Home</a>
                </li>             
                <li class="nav-item">
                  <a class="nav-link active" aria-current="page" href="{{ url_for('line_bp.logout') }}">Logout</a>
                </li>                
              </ul>
            </div>
        </div>
    </nav>
    <main>{% block content %}{% endblock %}</main>
    <footer class="text-center text-secondary small mt-5 mb-2">
      <div class="mt-4">
        Powered by MEA<br />
        <a href="#" class="text-secondary">ข้อตกลงและเงื่อนไขการให้บริการ</a> |
        <a href="#" class="text-secondary">นโยบายความเป็นส่วนตัว</a>
      </div>
    </footer>
  </body>
</html>
