<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Debug /last_scan</title>
</head>
<body>
  <h2>ทดสอบ Fetch /last_scan</h2>
  <button onclick="checkLastScan()">เรียกดูผลสแกนล่าสุด</button>

  <pre id="output">[ผลลัพธ์จะปรากฏที่นี่]</pre>

  <script>
    async function checkLastScan() {
      try {
        const res = await fetch('/last_scan');
        if (!res.ok) {
          document.getElementById('output').textContent = `HTTP error: ${res.status}`;
          console.error("Response not OK", res);
          return;
        }

        const data = await res.json();

        console.log("Fetch /last_scan result:", data);
        document.getElementById('output').textContent = JSON.stringify(data, null, 2);
      } catch (e) {
        console.error("Error while fetching /last_scan:", e);
        document.getElementById('output').textContent = 'เกิดข้อผิดพลาด: ' + e.message;
      }
    }
  </script>
</body>
</html>
