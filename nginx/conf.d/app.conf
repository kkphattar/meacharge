# Bootstrap config: used ONLY before the first SSL certificate is issued.
# Serves the ACME HTTP-01 challenge and proxies everything else over plain HTTP.
# After running certbot for the first time, replace this file's content with
# app-ssl.conf (see DEPLOY.md).

server {
    listen 80;
    server_name DOMAIN_NAME;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://web:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
